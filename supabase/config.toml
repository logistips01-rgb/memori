project_id = "memori"

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "524288000"

[auth]
enabled = true
site_url = "https://memori.mlorente.es"
additional_redirect_urls = [
  "https://memori.mlorente.es/panel.html",
  "https://memori.mlorente.es/funeraria.html",
  "http://localhost:8080/panel.html",
  "http://localhost:8080/funeraria.html"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
email_confirm_required = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"

[functions.deliver-messages]
verify_jwt = false

[functions.notify-death]
verify_jwt = true

[functions.create-checkout]
verify_jwt = true

[functions.stripe-webhook]
verify_jwt = false
